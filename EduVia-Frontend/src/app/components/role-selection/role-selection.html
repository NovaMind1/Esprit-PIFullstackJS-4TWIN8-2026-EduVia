<div class="role-selection-container">
  <div class="main-content">
    <div class="header">
      <div class="logo-wrapper">
        <img src="logo.png" alt="EduVia Logo" class="logo-img">
      </div>

      <h1 class="title">Eduvia</h1>
      <p class="subtitle">Accedez directement a l'espace enseignant</p>
    </div>

    <div class="roles-grid">
      <div class="role-card teacher" (click)="selectRole('teacher')">
        <div class="icon-circle teacher-circle">
          <mat-icon class="role-icon">group</mat-icon>
        </div>
        <h3>Enseignant</h3>
        <p>
          Suivi des etudiants, gestion des<br>
          contenus, quiz et rappels<br>
          personnalises
        </p>
        <button mat-flat-button class="access-btn teacher-btn">Acceder</button>
      </div>
    </div>
  </div>
</div>
