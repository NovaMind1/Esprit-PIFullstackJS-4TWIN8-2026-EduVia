<div class="ai-chat">
  <div class="ai-chat__intro">
    <div class="ai-chat__title-row">
      <div class="ai-chat__title-icon">
        <span>AI</span>
      </div>
      <div>
        <h2>Assistant d'apprentissage IA</h2>
        <p>Posez librement vos questions sur toute la plateforme EduVia</p>
      </div>
    </div>
  </div>

  <div class="ai-chat__panel">
    <div class="ai-chat__messages">
      <article
        *ngFor="let message of messages"
        class="ai-message"
        [class.ai-message--student]="message.sender === 'student'"
      >
        <div class="ai-message__avatar">
          <span *ngIf="message.sender === 'assistant'">IA</span>
          <span *ngIf="message.sender === 'student'">Moi</span>
        </div>

        <div class="ai-message__bubble">
          <p>{{ message.text }}</p>
          <span>{{ message.time }}</span>
        </div>
      </article>
    </div>

    <div class="ai-chat__status" *ngIf="pendingResponses > 0">
      Reponse detaillee en cours de synchronisation...
    </div>

    <div class="ai-chat__quick">
      <button type="button" *ngFor="let reply of quickReplies" (click)="useQuickReply(reply)">
        {{ reply }}
      </button>
    </div>

    <div class="ai-chat__composer">
      <input
        type="text"
        [(ngModel)]="draftMessage"
        (keydown.enter)="sendMessage()"
        placeholder="Posez votre question sur EduVia..."
      />
      <button type="button" (click)="sendMessage()" [class.is-busy]="pendingResponses > 0">
        Envoyer
      </button>
    </div>
  </div>
</div>
